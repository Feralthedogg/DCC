# Replace server_name and certificate paths before enabling this file.
server {
    listen 443 ssl http2;
    server_name interactions.example.com;

    ssl_certificate /etc/letsencrypt/live/interactions.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/interactions.example.com/privkey.pem;

    client_max_body_size 32k;

    location = /healthz {
        proxy_pass http://127.0.0.1:8080/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /interactions {
        proxy_pass http://127.0.0.1:8080/interactions;
        proxy_http_version 1.1;
        proxy_request_buffering on;
        proxy_pass_request_body on;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Signature-Ed25519 $http_x_signature_ed25519;
        proxy_set_header X-Signature-Timestamp $http_x_signature_timestamp;
        proxy_connect_timeout 2s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }
}
