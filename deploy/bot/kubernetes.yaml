apiVersion: v1
kind: Secret
metadata:
  name: dcc-bot
type: Opaque
stringData:
  DCC_TOKEN: replace-me
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dcc-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dcc-bot
  template:
    metadata:
      labels:
        app: dcc-bot
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      initContainers:
        - name: doctor
          image: ghcr.io/OWNER/dcc-bot:1.5.0
          command: ["/usr/local/bin/dcc_doctor"]
          args: ["--require-token", "--json"]
          envFrom:
            - secretRef:
                name: dcc-bot
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: bot
          image: ghcr.io/OWNER/dcc-bot:1.5.0
          envFrom:
            - secretRef:
                name: dcc-bot
          env:
            - name: DCC_STORE_FILE
              value: /var/lib/dcc/bot/state.kv
          volumeMounts:
            - name: state
              mountPath: /var/lib/dcc/bot
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: state
          emptyDir: {}
