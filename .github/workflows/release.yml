name: Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v1.5.0
        required: false
        default: v1.5.0
        type: string
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      - '[0-9]+.[0-9]+.[0-9]+*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-artifacts:
    name: build-artifacts (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
          - target: macos-aarch64
            runner: macos-14
          - target: macos-x86_64
            runner: macos-15-intel
          - target: windows-x86_64
            runner: windows-2022

    steps:
      - name: Checkout DCC
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: DCC

      - name: Checkout LLAM
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ github.repository_owner }}/LLAM
          ref: 2808e99c0339b8b3d6ed5ef7fab3dc231927c568 # v2.2.0
          path: LLAM

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ca-certificates clang cmake git libssl-dev \
            liburing-dev libopus-dev ninja-build python3 xz-utils

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake ninja openssl@3 opus
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"
          echo "OPUS_ROOT=$(brew --prefix opus)" >> "$GITHUB_ENV"

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install openssl:x64-windows
          "DCC_WINDOWS_CMAKE_TOOLCHAIN=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV

      - name: Build, test, and package POSIX
        if: runner.os != 'Windows'
        working-directory: DCC
        env:
          DCC_RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name || 'dev' }}
          DCC_CMAKE_GENERATOR: Ninja
          DCC_LLAM_USE_SUBDIRECTORY: ON
          DCC_BUNDLE_LLAM: OFF
          DCC_LLAM_ROOT: ${{ github.workspace }}/LLAM
          DCC_BUILD_PARALLEL: 4
          DCC_RELEASE_CTEST_EXCLUDE: ^(dcc_cluster_chaos_smoke|dcc_cluster_gateway_smoke)$
        run: tools/package_release.sh "${{ matrix.target }}"

      - name: Build, test, and package Windows
        if: runner.os == 'Windows'
        working-directory: DCC
        shell: pwsh
        env:
          DCC_RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name || 'dev' }}
          DCC_LLAM_USE_SUBDIRECTORY: ON
          DCC_BUNDLE_LLAM: OFF
          DCC_LLAM_ROOT: ${{ github.workspace }}\LLAM
          DCC_BUILD_PARALLEL: 4
        run: .\tools\package_release_windows.ps1 -Target "${{ matrix.target }}"

      - name: Upload platform artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-${{ matrix.target }}
          path: |
            DCC/target/dist/dcc-*-${{ matrix.target }}.tar.gz
            DCC/target/dist/dcc-*-${{ matrix.target }}.tar.gz.sha256
            DCC/target/dist/dcc-*-${{ matrix.target }}.zip
            DCC/target/dist/dcc-*-${{ matrix.target }}.zip.sha256
          if-no-files-found: error

      - name: Upload source artifact
        if: matrix.target == 'linux-x86_64'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-source
          path: |
            DCC/target/dist/dcc-*-source.tar.gz
            DCC/target/dist/dcc-*-source.tar.gz.sha256
          if-no-files-found: error

  build-bsd-artifacts:
    name: build-bsd-artifacts (${{ matrix.target }})
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    defaults:
      run:
        shell: cpa.sh {0}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: freebsd-x86_64
            os: freebsd
            version: '15.0'
            arch: x86-64
          - target: openbsd-x86_64
            os: openbsd
            version: '7.8'
            arch: x86-64
          - target: netbsd-x86_64
            os: netbsd
            version: '10.1'
            arch: x86-64

    steps:
      - name: Checkout DCC
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: DCC

      - name: Checkout LLAM
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ github.repository_owner }}/LLAM
          ref: 2808e99c0339b8b3d6ed5ef7fab3dc231927c568 # v2.2.0
          path: LLAM

      - name: Start BSD VM
        uses: cross-platform-actions/action@0c165ad7eb2d6a7e8552d6af5aad2bbedfc646b0 # v1.1.0
        timeout-minutes: 10
        with:
          operating_system: ${{ matrix.os }}
          version: ${{ matrix.version }}
          architecture: ${{ matrix.arch }}
          shell: sh
          memory: 6G
          cpu_count: 2

      - name: Install BSD dependencies
        run: |
          set -eu
          retry() {
            attempts=0
            max_attempts="${DCC_BSD_PKG_RETRIES:-8}"
            delay_seconds="${DCC_BSD_PKG_RETRY_DELAY:-20}"
            while ! "$@"; do
              attempts=$((attempts + 1))
              if [ "$attempts" -ge "$max_attempts" ]; then
                return 1
              fi
              sleep "$delay_seconds"
            done
          }
          case "$(uname -s)" in
            FreeBSD)
              retry sudo pkg install -y cmake openssl pkgconf
              ;;
            OpenBSD)
              sudo sh -c 'echo https://cdn.openbsd.org/pub/OpenBSD > /etc/installurl'
              retry sudo pkg_add cmake pkgconf
              ;;
            NetBSD)
              retry sudo pkgin -y install cmake openssl pkgconf
              ;;
          esac
          command -v cc
          command -v cmake

      - name: Build and package BSD
        run: |
          set -eu
          extra_args="-DDCC_WITH_OPUS=OFF -DDCC_BUILD_EXAMPLES=OFF -DDCC_BUILD_TESTS=OFF"
          case "$(uname -s)" in
            FreeBSD) extra_args="$extra_args -DOPENSSL_ROOT_DIR=/usr/local" ;;
            NetBSD) extra_args="$extra_args -DOPENSSL_ROOT_DIR=/usr/pkg" ;;
          esac
          DCC_RELEASE_VERSION="${{ github.event.inputs.version || github.ref_name || 'dev' }}" \
            DCC_ALLOW_VERSION_MISMATCH=1 \
            DCC_SKIP_RELEASE_TESTS=1 \
            DCC_BUILD_PARALLEL=2 \
            DCC_LLAM_USE_SUBDIRECTORY=ON \
            DCC_BUNDLE_LLAM=OFF \
            DCC_LLAM_ROOT="$GITHUB_WORKSPACE/LLAM" \
            DCC_EXTRA_CMAKE_ARGS="$extra_args" \
            sh "$GITHUB_WORKSPACE/DCC/tools/package_release.sh" "${{ matrix.target }}"

      - name: Upload BSD artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-${{ matrix.target }}
          path: |
            DCC/target/dist/dcc-*-${{ matrix.target }}.tar.gz
            DCC/target/dist/dcc-*-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  publish-release:
    name: publish-release
    needs:
      - build-artifacts
      - build-bsd-artifacts
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Add standalone installers
        run: |
          cp tools/install.sh release-artifacts/install.sh
          cp tools/install.ps1 release-artifacts/install.ps1
          chmod +x release-artifacts/install.sh
          cd release-artifacts
          sha256sum install.sh > install.sh.sha256
          sha256sum install.ps1 > install.ps1.sha256

      - name: Generate CycloneDX SBOM
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name || 'dev' }}
        run: |
          version="${RELEASE_VERSION#v}"
          python3 tools/generate_sbom.py \
            --version "$version" \
            --artifacts release-artifacts \
            --output "release-artifacts/dcc-${version}-sbom.cdx.json"
          cd release-artifacts
          sha256sum "dcc-${version}-sbom.cdx.json" > "dcc-${version}-sbom.cdx.json.sha256"

      - name: Build checksum manifest
        run: |
          cd release-artifacts
          cat ./*.sha256 | LC_ALL=C sort -k2 > SHA256SUMS

      - name: Build release notes
        env:
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name || 'dev' }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          cd release-artifacts
          version="${RELEASE_VERSION#v}"
          tag="${RELEASE_VERSION}"
          case "$tag" in
            v*) ;;
            *) tag="v$tag" ;;
          esac
          base_url="https://github.com/${REPOSITORY}/releases/download/${tag}"
          run_url="https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}"
          {
            echo "# DCC ${version}"
            echo
            echo "DCC ${version} publishes native Discord C runtime packages for Linux, macOS, Windows, and BSD."
            echo
            echo "## Highlights"
            echo
            echo "- LLAM 2.2.0 runtime baseline with generated version metadata and public API/legacy ABI release gates."
            echo "- Components V2 validation and serialization updates, callback response type 12, REST \`with_response\`, and interaction overload/replay/deadline protection."
            echo "- Runtime-loaded official Discord libdave backend for MLS state, key ratchets, and fail-closed Opus frame encryption/decryption."
            echo "- Production-safe bot presets, explicit development auto-sync aliases, and signal-safe graceful shutdown runners."
            echo "- Cluster-wide IDENTIFY coordination, jittered reconnects, and Prometheus metrics for cluster, interaction, voice, and DAVE health."
            echo "- Strict bounded replay validation, the no-network \`dcc_doctor\` diagnostic, and production systemd, Compose, and Kubernetes bot templates."
            echo "- Expanded operational, compatibility, contribution, support, security, and roadmap documentation."
            echo "- CycloneDX SBOM, SHA-256 manifest, immutable workflow pins, and GitHub build provenance attestations."
            echo
            echo "## Downloads"
            echo
            echo "| File | Platform | Checksum |"
            echo "| --- | --- | --- |"
            for row in \
              "linux-x86_64|Linux x86_64|tar.gz" \
              "linux-aarch64|Linux aarch64|tar.gz" \
              "macos-aarch64|macOS arm64|tar.gz" \
              "macos-x86_64|macOS x86_64|tar.gz" \
              "freebsd-x86_64|FreeBSD x86_64|tar.gz" \
              "openbsd-x86_64|OpenBSD x86_64|tar.gz" \
              "netbsd-x86_64|NetBSD x86_64|tar.gz" \
              "windows-x86_64|Windows x86_64|zip"; do
              target="$(printf '%s' "$row" | cut -d'|' -f1)"
              label="$(printf '%s' "$row" | cut -d'|' -f2)"
              ext="$(printf '%s' "$row" | cut -d'|' -f3)"
              file="dcc-${version}-${target}.${ext}"
              checksum="${file}.sha256"
              if [ -f "$file" ]; then
                echo "| [${file}](${base_url}/${file}) | ${label} | [checksum](${base_url}/${checksum}) |"
              fi
            done
            source_file="dcc-${version}-source.tar.gz"
            if [ -f "$source_file" ]; then
              echo "| [${source_file}](${base_url}/${source_file}) | Source | [checksum](${base_url}/${source_file}.sha256) |"
            fi
            echo
            echo "## Package Contents"
            echo
            echo "- Public headers under \`include/dcc/\`."
            echo "- Static DCC library and runtime helper tools."
            echo "- CMake package files under \`lib/cmake/dcc/\` and pkg-config metadata under \`lib/pkgconfig/\`."
            echo "- Runtime tools such as \`dcc_doctor\`, \`dcc_hot_reload_host\`, \`dcc_hot_reload_worker\`, \`dcc_command_sync\`, and \`dcc_replay\`."
            echo "- Examples, deployment templates, and Markdown documentation."
            echo
            echo "## Standalone Installers"
            echo
            echo "| File | Platform | Checksum |"
            echo "| --- | --- | --- |"
            echo "| [install.sh](${base_url}/install.sh) | POSIX release archives | [checksum](${base_url}/install.sh.sha256) |"
            echo "| [install.ps1](${base_url}/install.ps1) | Windows release archives | [checksum](${base_url}/install.ps1.sha256) |"
            echo
            echo "## Install Commands"
            echo
            echo "POSIX auto-detect:"
            echo
            echo "\`\`\`bash"
            echo "curl -fsSL https://github.com/Feralthedogg/LLAM/releases/latest/download/install.sh | sh -s -- --prefix \"\$HOME/.local\""
            echo "curl -fsSL ${base_url}/install.sh | sh -s -- --version ${version} --base-url \"${base_url}\" --prefix \"\$HOME/.local\""
            echo "\`\`\`"
            echo
            echo "POSIX explicit target:"
            echo
            echo "\`\`\`bash"
            echo "curl -fsSL https://github.com/Feralthedogg/LLAM/releases/latest/download/install.sh | sh -s -- --prefix \"\$HOME/.local\""
            echo "curl -fsSL ${base_url}/install.sh | sh -s -- --version ${version} --base-url \"${base_url}\" --target macos-aarch64 --prefix \"\$HOME/.local\""
            echo "\`\`\`"
            echo
            echo "Windows x86_64:"
            echo
            echo "\`\`\`powershell"
            echo "Invoke-WebRequest \"${base_url}/install.ps1\" -OutFile install.ps1; .\\install.ps1 -Version ${version} -BaseUrl \"${base_url}\" -Prefix \"\$env:LOCALAPPDATA\\DCC\""
            echo "\`\`\`"
            echo
            echo "Install LLAM separately before installing DCC, or pass --install-llam to the POSIX installer / -InstallLlam to the PowerShell installer to fetch the DCC-tested LLAM 2.2.0 runtime into the same prefix. FreeBSD, OpenBSD, and NetBSD release archives are published for x86_64; DragonFlyBSD is available as an experimental source/package-script target."
            echo
            echo "## Verification"
            echo
            echo "- Release workflow succeeded: ${run_url}"
            echo "- Release target commit: \`${RELEASE_SHA}\`."
            echo "- Full checksum manifest: [SHA256SUMS](${base_url}/SHA256SUMS)."
            echo "- CycloneDX SBOM: [dcc-${version}-sbom.cdx.json](${base_url}/dcc-${version}-sbom.cdx.json)."
          } > RELEASE_NOTES.md

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: |
            release-artifacts/*.tar.gz
            release-artifacts/*.zip
            release-artifacts/*.cdx.json
            release-artifacts/install.sh
            release-artifacts/install.ps1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.version }}
          name: DCC ${{ github.event.inputs.version || github.ref_name }}
          body_path: release-artifacts/RELEASE_NOTES.md
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/*.tar.gz.sha256
            release-artifacts/*.zip
            release-artifacts/*.zip.sha256
            release-artifacts/install.sh
            release-artifacts/install.sh.sha256
            release-artifacts/install.ps1
            release-artifacts/install.ps1.sha256
            release-artifacts/*.cdx.json
            release-artifacts/*.cdx.json.sha256
            release-artifacts/SHA256SUMS
